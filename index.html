<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Music Player - Free & Legal Music Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        /* Dark Mode (Default) */
        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --track-hover: rgba(255, 255, 255, 0.1);
            --track-active: rgba(99, 102, 241, 0.3);
            --input-bg: rgba(255, 255, 255, 0.1);
            --input-placeholder: rgba(156, 163, 175, 1);
            --secondary-text: rgba(156, 163, 175, 1);
        }
        
        /* Light Mode */
        .light-mode {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
            --text-color: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --track-hover: rgba(0, 0, 0, 0.05);
            --track-active: rgba(99, 102, 241, 0.2);
            --input-bg: rgba(255, 255, 255, 0.8);
            --input-placeholder: rgba(107, 114, 128, 1);
            --secondary-text: rgba(107, 114, 128, 1);
        }
        
        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            transition: background 0.3s ease, border 0.3s ease;
        }
        
        .track-item:hover {
            background: var(--track-hover);
        }
        
        .track-item.active {
            background: var(--track-active);
            border-left: 3px solid #6366f1;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 5px;
            height: 6px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .spin-animation {
            animation: spin 3s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.7);
        }
    </style>
</head>
<body class="dark-mode gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-lg flex items-center justify-center">
                    <i class="fas fa-music text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold">Open Music Player</h1>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="text-gray-400 hover:text-white transition-colors" title="Toggle theme">
                    <i class="fas fa-moon text-xl"></i>
                </button>
                <button id="settingsBtn" class="text-gray-400 hover:text-white transition-colors" title="Settings">
                    <i class="fas fa-cog text-xl"></i>
                </button>
            </div>
        </header>

        <!-- Source Selector -->
        <div class="glass-effect rounded-xl p-4 mb-6">
            <div class="flex gap-2 flex-wrap">
                <button class="source-btn active bg-indigo-500 px-4 py-2 rounded-lg font-medium transition-colors" data-source="jamendo">
                    <i class="fas fa-music mr-2"></i>Jamendo
                </button>
                <button class="source-btn bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg font-medium transition-colors" data-source="youtube">
                    <i class="fab fa-youtube mr-2"></i>YouTube
                </button>
                <button class="source-btn bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg font-medium transition-colors" data-source="spotify">
                    <i class="fab fa-spotify mr-2"></i>Spotify
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="glass-effect rounded-xl p-4 mb-6">
            <div class="flex gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search for tracks, artists..." 
                        class="w-full bg-white/10 rounded-lg py-3 pl-12 pr-4 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    >
                </div>
                <button 
                    id="searchBtn" 
                    class="bg-indigo-500 hover:bg-indigo-600 px-6 py-3 rounded-lg font-medium transition-colors"
                >
                    Search
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Track List -->
            <div class="lg:col-span-2">
                <div class="glass-effect rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4">Tracks</h2>
                    <div id="trackList" class="space-y-2 max-h-96 overflow-y-auto">
                        <div class="text-center py-8" style="color: var(--secondary-text);">
                            <i class="fas fa-music text-4xl mb-3"></i>
                            <p>Search for music to get started</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Now Playing -->
            <div class="lg:col-span-1">
                <div class="glass-effect rounded-xl p-6 sticky top-8">
                    <h2 class="text-xl font-semibold mb-4">Now Playing</h2>
                    
                    <!-- Album Art -->
                    <div id="albumArt" class="w-full aspect-square bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl mb-4 flex items-center justify-center">
                        <i class="fas fa-music text-6xl text-white/50"></i>
                    </div>
                    
                    <!-- Track Info -->
                    <div id="trackInfo" class="mb-4">
                        <h3 id="trackTitle" class="font-semibold text-lg truncate">No track selected</h3>
                        <p id="trackArtist" class="truncate" style="color: var(--secondary-text);">-</p>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="mb-4">
                        <input 
                            type="range" 
                            id="progressBar" 
                            class="w-full" 
                            value="0" 
                            min="0" 
                            max="100"
                        >
                        <div class="flex justify-between text-sm mt-1" style="color: var(--secondary-text);">
                            <span id="currentTime">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                    
                    <!-- Controls -->
                    <div class="flex items-center justify-center gap-4 mb-4">
                        <button id="shuffleBtn" class="transition-colors" style="color: var(--secondary-text);">
                            <i class="fas fa-random text-lg"></i>
                        </button>
                        <button id="prevBtn" class="text-white hover:text-indigo-400 transition-colors">
                            <i class="fas fa-step-backward text-2xl"></i>
                        </button>
                        <button id="playPauseBtn" class="w-14 h-14 bg-indigo-500 hover:bg-indigo-600 rounded-full flex items-center justify-center transition-colors">
                            <i class="fas fa-play text-xl" id="playPauseIcon"></i>
                        </button>
                        <button id="nextBtn" class="text-white hover:text-indigo-400 transition-colors">
                            <i class="fas fa-step-forward text-2xl"></i>
                        </button>
                        <button id="repeatBtn" class="transition-colors" style="color: var(--secondary-text);">
                            <i class="fas fa-redo text-lg"></i>
                        </button>
                    </div>
                    
                    <!-- Volume -->
                    <div class="flex items-center gap-3">
                        <i class="fas fa-volume-up" style="color: var(--secondary-text);"></i>
                        <input 
                            type="range" 
                            id="volumeBar" 
                            class="flex-1" 
                            value="80" 
                            min="0" 
                            max="100"
                        >
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center text-sm" style="color: var(--secondary-text);">
            <p id="footerText">Powered by Jamendo API - All music is royalty-free and legal to stream</p>
            <p class="mt-2">✨ No ads, ever ✨</p>
        </footer>

        <!-- Settings Modal -->
        <div id="settingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
            <div class="glass-effect rounded-xl p-6 max-w-md w-full mx-4">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold">API Settings</h2>
                    <button id="closeSettings" class="transition-colors" style="color: var(--secondary-text);">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">YouTube API Key</label>
                        <input 
                            type="text" 
                            id="youtubeApiKey" 
                            placeholder="Enter your YouTube API key"
                            class="w-full rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors"
                            style="background: var(--input-bg); color: var(--text-color);"
                        >
                        <p class="text-xs mt-1" style="color: var(--secondary-text);">Get it from console.cloud.google.com</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Spotify Client ID</label>
                        <input 
                            type="text" 
                            id="spotifyClientId" 
                            placeholder="Enter your Spotify Client ID"
                            class="w-full rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors"
                            style="background: var(--input-bg); color: var(--text-color);"
                        >
                        <p class="text-xs mt-1" style="color: var(--secondary-text);">Get it from developer.spotify.com</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Spotify Client Secret</label>
                        <input 
                            type="password" 
                            id="spotifyClientSecret" 
                            placeholder="Enter your Spotify Client Secret"
                            class="w-full rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors"
                            style="background: var(--input-bg); color: var(--text-color);"
                        >
                    </div>
                </div>
                
                <button id="saveSettings" class="w-full bg-indigo-500 hover:bg-indigo-600 py-3 rounded-lg font-medium mt-6 transition-colors">
                    Save Settings
                </button>
            </div>
        </div>

        <!-- YouTube Player Container -->
        <div id="youtubePlayer" class="hidden"></div>
    </div>

    <!-- Audio Element -->
    <audio id="audioPlayer"></audio>
    
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // State
        let tracks = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false;
        let currentSource = 'jamendo';
        let youtubePlayer = null;
        let youtubeApiKey = localStorage.getItem('youtubeApiKey') || '';
        let spotifyClientId = localStorage.getItem('spotifyClientId') || '';
        let spotifyClientSecret = localStorage.getItem('spotifyClientSecret') || '';
        let spotifyAccessToken = null;
        
        // DOM Elements
        const audioPlayer = document.getElementById('audioPlayer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const trackList = document.getElementById('trackList');
        const albumArt = document.getElementById('albumArt');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const volumeBar = document.getElementById('volumeBar');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const saveSettings = document.getElementById('saveSettings');
        const themeToggle = document.getElementById('themeToggle');
        const youtubeApiKeyInput = document.getElementById('youtubeApiKey');
        const spotifyClientIdInput = document.getElementById('spotifyClientId');
        const spotifyClientSecretInput = document.getElementById('spotifyClientSecret');
        const footerText = document.getElementById('footerText');
        
        // Jamendo API Client ID (free tier)
        const JAMENDO_CLIENT_ID = 'c4ce16c7';
        
        // Search for tracks based on source
        async function searchTracks(query) {
            if (currentSource === 'jamendo') {
                await searchJamendo(query);
            } else if (currentSource === 'youtube') {
                await searchYouTube(query);
            } else if (currentSource === 'spotify') {
                await searchSpotify(query);
            }
        }
        
        // Search Jamendo
        async function searchJamendo(query) {
            try {
                const response = await fetch(
                    `https://api.jamendo.com/v3.0/tracks/?client_id=${JAMENDO_CLIENT_ID}&format=jsonpretty&limit=20&search=${encodeURIComponent(query)}&include=musicinfo&imagesize=500`
                );
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    tracks = data.results.map(track => ({
                        ...track,
                        source: 'jamendo',
                        audio: track.audio,
                        image: track.image,
                        name: track.name,
                        artist_name: track.artist_name,
                        duration: track.duration
                    }));
                    renderTrackList();
                } else {
                    showNoResults();
                }
            } catch (error) {
                console.error('Error searching Jamendo:', error);
                showError();
            }
        }
        
        // Search YouTube
        async function searchYouTube(query) {
            if (!youtubeApiKey) {
                trackList.innerHTML = `
                    <div class="text-center py-8 text-yellow-400">
                        <i class="fas fa-key text-4xl mb-3"></i>
                        <p>YouTube API key required. Click settings to add it.</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query + ' music')}&type=video&key=${youtubeApiKey}`
                );
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    tracks = data.items.map(item => ({
                        source: 'youtube',
                        videoId: item.id.videoId,
                        name: item.snippet.title,
                        artist_name: item.snippet.channelTitle,
                        image: item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url,
                        duration: 0 // Will be fetched when needed
                    }));
                    renderTrackList();
                } else {
                    showNoResults();
                }
            } catch (error) {
                console.error('Error searching YouTube:', error);
                showError();
            }
        }
        
        // Search Spotify
        async function searchSpotify(query) {
            if (!spotifyClientId || !spotifyClientSecret) {
                trackList.innerHTML = `
                    <div class="text-center py-8 text-yellow-400">
                        <i class="fas fa-key text-4xl mb-3"></i>
                        <p>Spotify API credentials required. Click settings to add them.</p>
                    </div>
                `;
                return;
            }
            
            // Get access token if not available or expired
            if (!spotifyAccessToken) {
                await getSpotifyAccessToken();
            }
            
            try {
                const response = await fetch(
                    `https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=20`,
                    {
                        headers: {
                            'Authorization': `Bearer ${spotifyAccessToken}`
                        }
                    }
                );
                
                if (response.status === 401) {
                    // Token expired, get new one and retry
                    await getSpotifyAccessToken();
                    return searchSpotify(query);
                }
                
                const data = await response.json();
                
                if (data.tracks && data.tracks.items.length > 0) {
                    tracks = data.tracks.items.map(track => ({
                        source: 'spotify',
                        spotifyUrl: track.external_urls.spotify,
                        name: track.name,
                        artist_name: track.artists.map(a => a.name).join(', '),
                        image: track.album.images[0]?.url,
                        duration: track.duration_ms / 1000,
                        preview_url: track.preview_url
                    }));
                    renderTrackList();
                } else {
                    showNoResults();
                }
            } catch (error) {
                console.error('Error searching Spotify:', error);
                showError();
            }
        }
        
        // Get Spotify access token
        async function getSpotifyAccessToken() {
            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Authorization': 'Basic ' + btoa(spotifyClientId + ':' + spotifyClientSecret)
                },
                body: 'grant_type=client_credentials'
            });
            
            const data = await response.json();
            spotifyAccessToken = data.access_token;
        }
        
        function showNoResults() {
            trackList.innerHTML = `
                <div class="text-center text-gray-400 py-8">
                    <i class="fas fa-search text-4xl mb-3"></i>
                    <p>No tracks found. Try a different search.</p>
                </div>
            `;
        }
        
        function showError() {
            trackList.innerHTML = `
                <div class="text-center text-red-400 py-8">
                    <i class="fas fa-exclamation-circle text-4xl mb-3"></i>
                    <p>Error loading tracks. Please try again.</p>
                </div>
            `;
        }
        
        // Render track list
        function renderTrackList() {
            trackList.innerHTML = tracks.map((track, index) => `
                <div class="track-item p-3 rounded-lg cursor-pointer transition-colors ${index === currentTrackIndex ? 'active' : ''}" data-index="${index}">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <img 
                                src="${track.image || 'https://via.placeholder.com/50'}" 
                                alt="${track.name}" 
                                class="w-12 h-12 rounded object-cover"
                                onerror="this.src='https://via.placeholder.com/50'"
                            >
                            ${track.source === 'youtube' ? '<i class="fab fa-youtube absolute bottom-0 right-0 text-red-500 text-xs bg-black/50 rounded-full p-1"></i>' : ''}
                            ${track.source === 'spotify' ? '<i class="fab fa-spotify absolute bottom-0 right-0 text-green-500 text-xs bg-black/50 rounded-full p-1"></i>' : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-medium truncate">${track.name}</h4>
                            <p class="text-sm truncate" style="color: var(--secondary-text);">${track.artist_name}</p>
                        </div>
                        ${track.source === 'spotify' ? '<span class="text-xs text-yellow-400 bg-yellow-400/20 px-2 py-1 rounded">Preview</span>' : ''}
                        <span class="text-sm" style="color: var(--secondary-text);">${track.duration > 0 ? formatTime(track.duration) : '--:--'}</span>
                    </div>
                </div>
            `).join('');
            
            // Add click listeners
            document.querySelectorAll('.track-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    playTrack(index);
                });
            });
        }
        
        // Play track
        function playTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            
            if (track.source === 'youtube') {
                playYouTubeTrack(track);
            } else if (track.source === 'spotify') {
                playSpotifyTrack(track);
            } else {
                playJamendoTrack(track);
            }
            
            isPlaying = true;
            updatePlayPauseButton();
            updateNowPlaying(track);
            renderTrackList();
        }
        
        function playJamendoTrack(track) {
            audioPlayer.src = track.audio;
            audioPlayer.play();
            if (youtubePlayer) {
                youtubePlayer.stopVideo();
            }
        }
        
        function playYouTubeTrack(track) {
            if (!youtubePlayer) {
                youtubePlayer = new YT.Player('youtubePlayer', {
                    height: '0',
                    width: '0',
                    videoId: track.videoId,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0
                    },
                    events: {
                        'onStateChange': onYouTubeStateChange
                    }
                });
            } else {
                youtubePlayer.loadVideoById(track.videoId);
            }
            audioPlayer.pause();
        }
        
        function playSpotifyTrack(track) {
            if (track.preview_url) {
                audioPlayer.src = track.preview_url;
                audioPlayer.play();
                if (youtubePlayer) {
                    youtubePlayer.stopVideo();
                }
            } else {
                alert('No preview available for this track. Full playback requires Spotify Premium.');
                // Open in Spotify
                window.open(track.spotifyUrl, '_blank');
            }
        }
        
        function onYouTubeStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                if (!isRepeat) {
                    nextBtn.click();
                }
            }
        }
        
        // Update now playing
        function updateNowPlaying(track) {
            trackTitle.textContent = track.name;
            trackArtist.textContent = track.artist_name;
            
            if (track.image) {
                albumArt.innerHTML = `<img src="${track.image}" alt="${track.name}" class="w-full h-full object-cover rounded-xl">`;
            } else {
                albumArt.innerHTML = `<i class="fas fa-music text-6xl text-white/50"></i>`;
            }
        }
        
        // Update play/pause button
        function updatePlayPauseButton() {
            if (isPlaying) {
                playPauseIcon.classList.remove('fa-play');
                playPauseIcon.classList.add('fa-pause');
            } else {
                playPauseIcon.classList.remove('fa-pause');
                playPauseIcon.classList.add('fa-play');
            }
        }
        
        // Format time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Event Listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                searchTracks(query);
            }
        });
        
        // Source selector
        document.querySelectorAll('.source-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.source-btn').forEach(b => {
                    b.classList.remove('active', 'bg-indigo-500');
                    b.classList.add('bg-white/10');
                });
                btn.classList.add('active', 'bg-indigo-500');
                btn.classList.remove('bg-white/10');
                
                currentSource = btn.dataset.source;
                updateFooterText();
                
                // Clear current tracks
                tracks = [];
                trackList.innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <i class="fas fa-music text-4xl mb-3"></i>
                        <p>Search for music to get started</p>
                    </div>
                `;
                
                // Stop current playback
                audioPlayer.pause();
                if (youtubePlayer) {
                    youtubePlayer.stopVideo();
                }
                isPlaying = false;
                updatePlayPauseButton();
            });
        });
        
        // Settings modal
        settingsBtn.addEventListener('click', () => {
            youtubeApiKeyInput.value = youtubeApiKey;
            spotifyClientIdInput.value = spotifyClientId;
            spotifyClientSecretInput.value = spotifyClientSecret;
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
        });
        
        closeSettings.addEventListener('click', () => {
            settingsModal.classList.add('hidden');
            settingsModal.classList.remove('flex');
        });
        
        saveSettings.addEventListener('click', () => {
            youtubeApiKey = youtubeApiKeyInput.value.trim();
            spotifyClientId = spotifyClientIdInput.value.trim();
            spotifyClientSecret = spotifyClientSecretInput.value.trim();
            
            localStorage.setItem('youtubeApiKey', youtubeApiKey);
            localStorage.setItem('spotifyClientId', spotifyClientId);
            localStorage.setItem('spotifyClientSecret', spotifyClientSecret);
            
            settingsModal.classList.add('hidden');
            settingsModal.classList.remove('flex');
            
            // Clear Spotify token on credential change
            spotifyAccessToken = null;
        });
        
        function updateFooterText() {
            if (currentSource === 'jamendo') {
                footerText.textContent = 'Powered by Jamendo API - All music is royalty-free and legal to stream';
            } else if (currentSource === 'youtube') {
                footerText.textContent = 'Powered by YouTube API - Music videos from YouTube';
            } else if (currentSource === 'spotify') {
                footerText.textContent = 'Powered by Spotify API - Preview tracks (full playback requires Spotify Premium)';
            }
        }
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    searchTracks(query);
                }
            }
        });
        
        playPauseBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            
            if (currentSource === 'youtube' && youtubePlayer) {
                if (isPlaying) {
                    youtubePlayer.pauseVideo();
                } else {
                    youtubePlayer.playVideo();
                }
            } else {
                if (isPlaying) {
                    audioPlayer.pause();
                } else {
                    audioPlayer.play();
                }
            }
            isPlaying = !isPlaying;
            updatePlayPauseButton();
        });
        
        prevBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            
            if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * tracks.length);
            } else {
                currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            }
            playTrack(currentTrackIndex);
        });
        
        nextBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            
            if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * tracks.length);
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            }
            playTrack(currentTrackIndex);
        });
        
        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('text-indigo-500', isShuffle);
            shuffleBtn.classList.toggle('text-gray-400', !isShuffle);
        });
        
        repeatBtn.addEventListener('click', () => {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('text-indigo-500', isRepeat);
            repeatBtn.classList.toggle('text-gray-400', !isRepeat);
            audioPlayer.loop = isRepeat;
            if (youtubePlayer) {
                youtubePlayer.setLoop(isRepeat);
            }
        });
        
        volumeBar.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
        });
        
        progressBar.addEventListener('input', (e) => {
            if (currentSource === 'youtube' && youtubePlayer) {
                const duration = youtubePlayer.getDuration();
                const time = (e.target.value / 100) * duration;
                youtubePlayer.seekTo(time, true);
            } else {
                const time = (e.target.value / 100) * audioPlayer.duration;
                audioPlayer.currentTime = time;
            }
        });
        
        audioPlayer.addEventListener('timeupdate', () => {
            if (currentSource !== 'youtube') {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.value = progress || 0;
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            }
        });
        
        // YouTube progress update
        setInterval(() => {
            if (currentSource === 'youtube' && youtubePlayer && isPlaying) {
                const currentTime = youtubePlayer.getCurrentTime();
                const duration = youtubePlayer.getDuration();
                const progress = (currentTime / duration) * 100;
                progressBar.value = progress || 0;
                currentTimeEl.textContent = formatTime(currentTime);
                durationEl.textContent = formatTime(duration);
            }
        }, 1000);
        
        audioPlayer.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioPlayer.duration);
        });
        
        audioPlayer.addEventListener('ended', () => {
            if (!isRepeat) {
                nextBtn.click();
            }
        });
        
        // Initialize volume
        audioPlayer.volume = 0.8;
        
        // Theme toggle
        let isDarkMode = localStorage.getItem('theme') !== 'light';
        
        function applyTheme() {
            if (isDarkMode) {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon text-xl"></i>';
            } else {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun text-xl"></i>';
            }
        }
        
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        });
        
        // Apply initial theme
        applyTheme();
        
        // Load some popular tracks on start
        searchTracks('popular');
        
        // YouTube API ready callback
        function onYouTubeIframeAPIReady() {
            console.log('YouTube API ready');
        }
    </script>
</body>
</html>
