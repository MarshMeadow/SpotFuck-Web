<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Secure Connection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0d0d15 50%, #0a0a12 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        .lock-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #e94560;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .secure-badge {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .warning {
            margin-top: 30px;
            padding: 15px;
            background: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            text-align: left;
            font-size: 14px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">🔒</div>
        <h1>Access Denied</h1>
        <p>
            Sorry, this is a private secure connection. Only approved members can use this service.
        </p>
        <div class="secure-badge">Secure Connection</div>
        <div class="warning">
            ⚠️ This page is protected by multiple security measures. Unauthorized access attempts are monitored and logged.
        </div>
    </div>

    <script>
        // Disable right-click
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            alert('Right-click is disabled on this secure page.');
            return false;
        });

        // Disable common keyboard shortcuts for dev tools
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                alert('Developer tools are disabled on this secure page.');
                return false;
            }

            // Ctrl+Shift+I (Chrome/Edge DevTools)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                alert('Developer tools are disabled on this secure page.');
                return false;
            }

            // Ctrl+Shift+J (Chrome/Edge Console)
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
                alert('Developer tools are disabled on this secure page.');
                return false;
            }

            // Ctrl+Shift+C (Chrome/Edge Element Inspector)
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                alert('Developer tools are disabled on this secure page.');
                return false;
            }

            // Ctrl+U (View Source)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                alert('Viewing source is disabled on this secure page.');
                return false;
            }

            // Ctrl+S (Save)
            if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault();
                alert('Saving this page is disabled.');
                return false;
            }

            // Ctrl+P (Print)
            if (e.ctrlKey && (e.key === 'P' || e.key === 'p')) {
                e.preventDefault();
                alert('Printing this page is disabled.');
                return false;
            }
        });

        // Detect dev tools opening
        let devToolsOpen = false;
        
        const detectDevTools = () => {
            const threshold = 160;
            const widthDiff = window.outerWidth - window.innerWidth > threshold;
            const heightDiff = window.outerHeight - window.innerHeight > threshold;
            
            if (widthDiff || heightDiff) {
                if (!devToolsOpen) {
                    devToolsOpen = true;
                    alert('Developer tools detected! This action has been logged.');
                    // Optionally redirect or take other action
                    // window.location.href = 'about:blank';
                }
            } else {
                devToolsOpen = false;
            }
        };

        setInterval(detectDevTools, 1000);

        // Disable text selection
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });

        // Disable drag and drop
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });

        // Clear console on load
        console.clear();
        console.log('%cSecurity Alert', 'color: red; font-size: 30px; font-weight: bold;');
        console.log('%cThis is a private secure connection. Unauthorized access is prohibited.', 'color: orange; font-size: 16px;');

        // Disable inspect element via long press (mobile)
        let touchTimer;
        document.addEventListener('touchstart', function(e) {
            touchTimer = setTimeout(function() {
                alert('Inspect element is disabled on this secure page.');
            }, 800);
        });

        document.addEventListener('touchend', function() {
            clearTimeout(touchTimer);
        });

        // Warn on page visibility change (potential tab switching to dev tools)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                console.log('Page hidden - potential security concern');
            }
        });
    </script>
</body>
</html>
