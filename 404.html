<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Track Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .vinyl-record {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #1a1a1a, #2d2d2d);
            border-radius: 50%;
            margin: 0 auto 2rem;
            position: relative;
            animation: spin 3s linear infinite;
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.3);
        }

        .vinyl-record::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #8b5cf6, #6366f1);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .vinyl-record::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: #0a0a0a;
            border-radius: 50%;
        }

        .grooves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .grooves:nth-child(2) {
            width: 150px;
            height: 150px;
        }

        .grooves:nth-child(3) {
            width: 120px;
            height: 120px;
        }

        .grooves:nth-child(4) {
            width: 90px;
            height: 90px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #8b5cf6);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .error-message {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
        }

        .error-subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .music-notes {
            position: fixed;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .music-notes:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .music-notes:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .music-notes:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 2s; }
        .music-notes:nth-child(4) { bottom: 15%; right: 10%; animation-delay: 3s; }
        .music-notes:nth-child(5) { top: 40%; left: 5%; animation-delay: 4s; }
        .music-notes:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .countdown {
            font-size: 1.2rem;
            color: #8b5cf6;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .countdown span {
            font-weight: bold;
            color: #ec4899;
        }

        .equalizer {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin: 2rem 0;
        }

        .bar {
            width: 8px;
            background: linear-gradient(to top, #8b5cf6, #ec4899);
            border-radius: 4px;
            animation: equalize 1s ease-in-out infinite;
        }

        .bar:nth-child(1) { height: 40px; animation-delay: 0s; }
        .bar:nth-child(2) { height: 60px; animation-delay: 0.1s; }
        .bar:nth-child(3) { height: 30px; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 70px; animation-delay: 0.3s; }
        .bar:nth-child(5) { height: 50px; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 80px; animation-delay: 0.5s; }
        .bar:nth-child(7) { height: 45px; animation-delay: 0.6s; }
        .bar:nth-child(8) { height: 65px; animation-delay: 0.7s; }

        @keyframes equalize {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }

        .redirect-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 12px 32px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .redirect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }
    </style>
</head>
<body>
    <div class="music-notes">🎵</div>
    <div class="music-notes">🎶</div>
    <div class="music-notes">🎵</div>
    <div class="music-notes">🎶</div>
    <div class="music-notes">🎵</div>
    <div class="music-notes">🎶</div>

    <div class="container">
        <div class="vinyl-record">
            <div class="grooves"></div>
            <div class="grooves"></div>
            <div class="grooves"></div>
            <div class="grooves"></div>
        </div>

        <div class="error-code">404</div>
        <div class="error-message">Track Not Found</div>
        <div class="error-subtitle">This song seems to have skipped the playlist</div>

        <div class="equalizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="countdown">
            Redirecting in <span id="timer">30</span> seconds...
        </div>

        <a href="https://spotfuck.netlify.app/" class="redirect-btn">Go to Music App Now</a>
    </div>

    <script>
        let countdown = 30;
        const timerElement = document.getElementById('timer');

        const interval = setInterval(() => {
            countdown--;
            timerElement.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(interval);
                window.location.href = 'https://spotfuck.netlify.app/';
            }
        }, 1000);
    </script>
</body>
</html>
